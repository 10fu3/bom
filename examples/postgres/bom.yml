output:
  root: ./examples/postgres/generated

dialect: postgres
include_tables: [author, author_profile, video, comment, tag, video_tag]

associations:
  author:
    - type: HasMany
      to: video
      local_keys: [id]
      foreign_keys: [author_id]
  author_profile:
    - type: BelongsTo
      to: author
      local_keys: [author_id]
      foreign_keys: [id]
  video:
    - type: BelongsTo
      to: author
      local_keys: [author_id]
      foreign_keys: [id]
